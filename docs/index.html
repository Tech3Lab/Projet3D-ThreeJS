<!DOCTYPE html>
<html>
	<head lang="en">
		<meta charset="utf-8">
		<title>My first three.js app</title>
		<style>
			body { margin: 0; overflow: hidden; }
			#app {
				display: flex;
				height: 100vh;
				width: 100vw;
			}
			.viewer-panel {
				flex: 1 1 50%;
				min-width: 0;
				position: relative;
				overflow: hidden;
			}
			.viewer-panel.collapsed {
				flex: 0 0 0 !important;
				overflow: hidden;
				pointer-events: none;
			}
			.viewer-canvas {
				width: 100%;
				height: 100%;
			}
			#resizer {
				width: 6px;
				flex-shrink: 0;
				cursor: col-resize;
				background: #2a2a2a;
				transition: background 0.15s;
			}
			#resizer:hover,
			#resizer.active {
				background: #5a9fd4;
			}
			.baseline-indicator {
				display: none;
				position: absolute;
				top: 8px;
				left: 50%;
				transform: translateX(-50%);
				padding: 4px 10px;
				font: 12px/1.4 sans-serif;
				color: #fff;
				background: rgba(0, 0, 0, 0.55);
				border-radius: 4px;
				pointer-events: none;
				z-index: 10;
			}
			.baseline-indicator.visible {
				display: block;
			}
		</style>
		<script type="module" crossorigin src="./assets/index-87cc1c0b.js"></script>
	</head>
	<body>
		<div id="app">
			<div id="panel-left" class="viewer-panel">
				<div id="viewer-75" class="viewer-canvas"></div>
			</div>
			<div id="resizer"></div>
			<div id="panel-right" class="viewer-panel">
				<div id="viewer-76" class="viewer-canvas"></div>
			</div>
		</div>
		
	</body>
</html>
